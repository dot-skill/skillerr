name: Second runtime
description: Claim, report progress on, or ask questions about an independent (Go/Rust/…) runtime implementation
labels: ["second-runtime"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - Claiming this before starting (see CONTRIBUTING.md)
        - Progress update
        - Question about the corpus/spec
        - Found a spec gap while implementing
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: Language
      placeholder: Go, Rust, …
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What you've reproduced so far (adversarial corpus, canonicalization vectors, Ed25519/DSSE signing), or the specific question/gap.
    validations:
      required: true
