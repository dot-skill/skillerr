name: Publish

# Tag-based releases only. Merge to main runs CI, not publish.
# Docs site deploys from dot-skill/skillerr-com — not this repo.
#
# Flow: merge → CI green → git tag vX.Y.Z → this workflow (test + publish).
# We do not publish on every push to main — tags prevent accidental releases.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to publish from (defaults to the workflow ref)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing + provenance require npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test
      - run: npm run test:examples
      - run: npm run pack:check

      # Order: protocol → core → runtime → registry → workspace → cli → skillerr
      # Auth: npm Trusted Publishing (OIDC). Optional fallback: NPM_TOKEN secret.
      # Skip versions already on the registry so a partial bump (e.g. skillerr@0.6.3)
      # can publish without failing on unchanged @skillerr/*@0.6.0 packages.
      - name: Publish packages
        env:
          NPM_TOKEN_FALLBACK: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          # Empty NODE_AUTH_TOKEN blocks OIDC; only set it when NPM_TOKEN exists.
          if [[ -n "${NPM_TOKEN_FALLBACK:-}" ]]; then
            export NODE_AUTH_TOKEN="${NPM_TOKEN_FALLBACK}"
          else
            unset NODE_AUTH_TOKEN || true
          fi

          publish_one() {
            local ws="$1"
            local name ver
            name="$(npm pkg get name -w "${ws}" | tr -d '"')"
            ver="$(npm pkg get version -w "${ws}" | tr -d '"')"
            echo "::group::npm publish -w ${ws} (${name}@${ver})"
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "Skip ${name}@${ver} — already on npm"
              echo "::endgroup::"
              return 0
            fi
            if [[ "${name}" == @* ]]; then
              npm publish -w "${ws}" --access public --provenance
            else
              npm publish -w "${ws}" --provenance
            fi
            echo "::endgroup::"
          }
          publish_one @skillerr/protocol
          publish_one @skillerr/core
          publish_one @skillerr/runtime
          publish_one @skillerr/registry
          publish_one @skillerr/workspace
          publish_one @skillerr/cli
          publish_one skillerr
