name: Publish

# Tag-based releases only. Merge to main runs CI, not publish.
# Docs site deploys from dot-skill/skillerr-com — not this repo.
#
# Flow: merge → CI green → git tag vX.Y.Z → this workflow (test + publish).
# We do not publish on every push to main — tags prevent accidental releases.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to publish from (defaults to the workflow ref)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing + provenance require npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test
      - run: npm run test:examples
      - run: npm run pack:check

      # Order: protocol → core → runtime → registry → workspace → cli → skillerr
      # Auth: npm Trusted Publishing (OIDC). Optional fallback: NPM_TOKEN secret.
      # Skip versions already on the registry so a partial bump (e.g. skillerr@0.6.3)
      # can publish without failing on unchanged @skillerr/*@0.6.0 packages.
      - name: Publish packages
        env:
          NPM_TOKEN_FALLBACK: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          # Empty NODE_AUTH_TOKEN blocks OIDC; only set it when NPM_TOKEN exists.
          if [[ -n "${NPM_TOKEN_FALLBACK:-}" ]]; then
            export NODE_AUTH_TOKEN="${NPM_TOKEN_FALLBACK}"
          else
            unset NODE_AUTH_TOKEN || true
          fi

          # Read name/version from package.json — do not use `npm pkg get | tr`
          # (workspace JSON + quote stripping mangles the query and skip never matches).
          publish_one() {
            local dir="$1"
            local name ver
            name="$(node -p "require('./${dir}/package.json').name")"
            ver="$(node -p "require('./${dir}/package.json').version")"
            if [[ -z "${name}" || -z "${ver}" || "${name}" == *[{}]* || "${ver}" == *[{}]* ]]; then
              echo "::error::Failed to parse name/version from ${dir}/package.json (got name=${name@Q} ver=${ver@Q})"
              return 1
            fi
            echo "::group::npm publish -w ${name} (${name}@${ver})"
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "Skip ${name}@${ver} — already on npm"
              echo "::endgroup::"
              return 0
            fi
            if [[ "${name}" == @* ]]; then
              npm publish -w "${name}" --access public --provenance
            else
              npm publish -w "${name}" --provenance
            fi
            echo "::endgroup::"
          }
          publish_one packages/protocol
          publish_one packages/core
          publish_one packages/runtime
          publish_one packages/registry
          publish_one packages/workspace
          publish_one packages/cli
          publish_one packages/skillerr
