name: Publish

# Runs on every push to main, and on tag pushes. Docs site deploys from
# dot-skill/skillerr-com — not this repo.
#
# Flow: merge to main -> this workflow runs test/build gates, then attempts
# to publish every package. Safe on every merge, not just version-bump
# merges: publish_one below skips any package whose current version is
# already on npm, so a docs-only merge (unchanged version) is a no-op here,
# not an error. A manual `git tag vX.Y.Z && git push origin vX.Y.Z` (or
# workflow_dispatch) still works too, e.g. to publish a ref other than the
# tip of main, or to force a GitHub Release (still tag-gated, see below).

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to publish from (defaults to the workflow ref)"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing + provenance require npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test
      - run: npm run test:examples
      - run: npm run pack:check

      # Order: protocol → core → runtime → registry → workspace → cli → skillerr
      # Auth: npm Trusted Publishing (OIDC). Optional fallback: NPM_TOKEN secret.
      # Skip versions already on the registry so a partial bump (e.g. skillerr@0.6.3)
      # can publish without failing on unchanged @skillerr/*@0.6.0 packages.
      - name: Publish packages
        env:
          NPM_TOKEN_FALLBACK: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          # Empty NODE_AUTH_TOKEN blocks OIDC; only set it when NPM_TOKEN exists.
          if [[ -n "${NPM_TOKEN_FALLBACK:-}" ]]; then
            export NODE_AUTH_TOKEN="${NPM_TOKEN_FALLBACK}"
          else
            unset NODE_AUTH_TOKEN || true
          fi

          # Read name/version from package.json — do not use `npm pkg get | tr`
          # (workspace JSON + quote stripping mangles the query and skip never matches).
          publish_one() {
            local dir="$1"
            local name ver
            name="$(node -p "require('./${dir}/package.json').name")"
            ver="$(node -p "require('./${dir}/package.json').version")"
            if [[ -z "${name}" || -z "${ver}" || "${name}" == *[{}]* || "${ver}" == *[{}]* ]]; then
              echo "::error::Failed to parse name/version from ${dir}/package.json (got name=${name@Q} ver=${ver@Q})"
              return 1
            fi
            echo "::group::npm publish -w ${name} (${name}@${ver})"
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "Skip ${name}@${ver} — already on npm"
              echo "::endgroup::"
              return 0
            fi
            if [[ "${name}" == @* ]]; then
              npm publish -w "${name}" --access public --provenance
            else
              npm publish -w "${name}" --provenance
            fi
            echo "::endgroup::"
          }
          publish_one packages/protocol
          publish_one packages/core
          publish_one packages/runtime
          publish_one packages/registry
          publish_one packages/workspace
          publish_one packages/cli
          publish_one packages/skillerr

      # Keeps the GitHub Releases page in sync with what actually shipped to
      # npm — a tag alone doesn't show up there, so without this the repo
      # looks unreleased even after a real publish.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping"
          else
            gh release create "${TAG}" --repo "${GITHUB_REPOSITORY}" --title "${TAG}" --generate-notes
          fi
