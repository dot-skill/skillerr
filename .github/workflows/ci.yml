name: CI

# Test and build only. No npm publish.
# Releases: tag v* → publish.yml (see docs/PUBLISHING.md).
# Docs site: dot-skill/skillerr-com (not this repo).

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:examples
      - run: npm run pack:check
      - name: Verify hardcoded package-version mentions match packages/skillerr/package.json
        run: node scripts/check-doc-versions.mjs
      - name: Verify @skillerr/core has no dependency on the registry (spec/CONTRACT.md)
        run: node scripts/check-core-registry-independence.mjs
      - name: Verify npm README is in sync with the root README
        # Unlike the brand job's PNGs, this is pure text transformation —
        # fully deterministic across OS, so a strict byte-diff is safe here.
        run: |
          node scripts/sync-npm-readme.mjs
          git diff --exit-code packages/skillerr/README.md || {
            echo "::error::packages/skillerr/README.md is out of sync with README.md — run 'node scripts/sync-npm-readme.mjs' and commit the result.";
            exit 1;
          }

  brand:
    # Proves scripts/build-brand.mjs actually runs end-to-end against the
    # checked-in master SVGs (assets/skillerr-mark.svg,
    # assets/skillerr-lockup.svg) without erroring — catching a broken
    # pipeline (bad SVG, script bug, missing dependency), which is the
    # thing this job can reliably guarantee cross-machine.
    #
    # This deliberately does NOT byte-diff the regenerated PNGs/ICO against
    # the checked-in ones: sharp/libvips's PNG encoding is not guaranteed
    # byte-identical across OS/architecture/library-patch-version even for
    # pixel-identical output (metadata chunks, compression-path
    # differences), so a contributor regenerating locally on macOS and CI
    # regenerating on ubuntu can legitimately produce different bytes for
    # the same SVG input. A strict `git diff --exit-code` here previously
    # failed CI on every PR regardless of whether the SVGs actually
    # changed — see git history. Pixel-level (not byte-level) comparison
    # would restore a real drift check; noted as a "Next" contribution in
    # docs/ROADMAP.md rather than shipped half-working.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/build-brand.mjs
